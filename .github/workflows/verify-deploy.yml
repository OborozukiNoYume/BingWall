name: Verify Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - .github/workflows/verify-deploy.yml
      - Makefile
      - pyproject.toml
      - uv.lock
      - app/**
      - deploy/**
      - scripts/github/run_verify_deploy.sh
      - scripts/verify_t1_6.py
      - web/public/assets/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/verify-deploy.yml
      - Makefile
      - pyproject.toml
      - uv.lock
      - app/**
      - deploy/**
      - scripts/github/run_verify_deploy.sh
      - scripts/verify_t1_6.py
      - web/public/assets/**

permissions:
  contents: read

concurrency:
  group: verify-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-deploy:
    name: verify-deploy
    runs-on:
      - self-hosted
      - linux
      - x64
      - bingwall-deploy
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --python 3.14 --frozen

      - name: Show runner prerequisites
        run: |
          set -euo pipefail
          for cmd in docker systemd-analyze systemd-run systemctl journalctl systemd-tmpfiles; do
            command -v "$cmd"
          done
          docker --version
          systemd-analyze --version | head -n 1

      - name: Run deployment verification
        run: bash scripts/github/run_verify_deploy.sh
