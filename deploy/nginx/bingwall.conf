upstream bingwall_app {
    # Keep this upstream aligned with BINGWALL_APP_HOST/BINGWALL_APP_PORT in /etc/bingwall/bingwall.env.
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/bingwall/nginx.access.log;
    error_log /var/log/bingwall/nginx.error.log warn;

    client_max_body_size 10m;

    location /images/ {
        alias /var/lib/bingwall/images/public/;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location /assets/ {
        alias /opt/bingwall/app/web/public/assets/;
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://bingwall_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $request_id;
    }

    location / {
        proxy_pass http://bingwall_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-Id $request_id;
    }
}
